<header id="header">
  <div class="container">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="header-logo-wrap" aria-label="{{ site.data.site.company_name }} Home">
        <img src="{{ '/img/Barnes-Logo-Bulldozer-Illustrator.png' | relative_url }}"
             alt="{{ site.data.site.company_name }} Logo"
             style="height:60px;width:60px;border-radius:50%;object-fit:cover;border:2px solid #D8A539;">
        <div class="header-logo-text">
          <span class="name">{{ site.data.site.company_name }}</span>
          <span class="tagline">{{ site.data.site.tagline }}</span>
        </div>
      </a>

      <nav class="header-nav" aria-label="Main navigation">
        {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>{{ item.label }}</a>
        {% endfor %}
      </nav>

      <div class="header-cta">
        <a href="{{ site.data.site.phone_link }}" class="header-phone">
          <span class="icon">&#9990;</span> {{ site.data.site.phone }}
        </a>
      </div>

      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <nav class="mobile-nav" id="mobileNav" aria-label="Mobile navigation">
    {% for item in site.data.navigation %}
    <a href="{{ item.url | relative_url }}" class="mobile-link">{{ item.label }}</a>
    {% endfor %}
    <a href="{{ site.data.site.phone_link }}" class="mobile-link" style="color:var(--gold);">&#9990; {{ site.data.site.phone }}</a>
  </nav>
</header>
