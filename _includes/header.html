<header id="header">
  <div class="container">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="header-logo-wrap" aria-label="Barnes Demolition Home">
        <img src="{{ '/img/Barnes-Logo-Bulldozer-Illustrator.png' | relative_url }}"
             alt="Barnes Demolition Logo"
             style="height:60px;width:60px;border-radius:50%;object-fit:cover;border:2px solid #D8A539;">
        <div class="header-logo-text">
          <span class="name">Barnes Demolition</span>
          <span class="tagline">Wilmington's Heavy Hitters</span>
        </div>
      </a>

      <nav class="header-nav" aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
        <a href="{{ '/services.html' | relative_url }}"{% if page.url contains 'services' %} class="active"{% endif %}>Services</a>
        <a href="{{ '/#about' | relative_url }}">About</a>
        <a href="{{ '/#why' | relative_url }}">Why Us</a>
        <a href="{{ '/#contact' | relative_url }}">Contact</a>
      </nav>

      <div class="header-cta">
        <a href="tel:9018075640" class="header-phone">
          <span class="icon">&#9990;</span> (901) 807-5640
        </a>
      </div>

      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <nav class="mobile-nav" id="mobileNav" aria-label="Mobile navigation">
    <a href="{{ '/' | relative_url }}" class="mobile-link">Home</a>
    <a href="{{ '/services.html' | relative_url }}" class="mobile-link">Services</a>
    <a href="{{ '/#about' | relative_url }}" class="mobile-link">About</a>
    <a href="{{ '/#why' | relative_url }}" class="mobile-link">Why Us</a>
    <a href="{{ '/#contact' | relative_url }}" class="mobile-link">Get a Quote</a>
    <a href="tel:9018075640" class="mobile-link" style="color:var(--gold);">&#9990; (901) 807-5640</a>
  </nav>
</header>
