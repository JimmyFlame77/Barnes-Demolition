<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="robots" content="{{ page.robots | default: 'index, follow' }}">
  <title>{{ page.title | default: site.title }}</title>
  {% if page.canonical %}<link rel="canonical" href="{{ page.canonical }}">{% endif %}

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.og_title | default: page.title }}">
  <meta property="og:description" content="{{ page.og_description | default: page.description }}">
  <meta property="og:image" content="{{ page.og_image | default: '/img/og-image.jpg' | relative_url }}">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.twitter_title | default: page.title }}">
  <meta name="twitter:description" content="{{ page.twitter_description | default: page.description }}">
  <meta name="twitter:image" content="{{ page.twitter_image | default: page.og_image | default: '/img/og-image.jpg' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/img/favicon.png' | relative_url }}">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">

  <!-- LocalBusiness Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "{{ site.data.site.company_name }}",
    "description": "{{ site.description }}",
    "telephone": "{{ site.data.site.phone }}",
    "email": "{{ site.data.site.email }}",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Wilmington",
      "addressRegion": "NC",
      "postalCode": "28401",
      "addressCountry": "US"
    },
    "areaServed": [
      {% for area in site.data.service_areas %}"{{ area.name }}"{% unless forloop.last %}, {% endunless %}{% endfor %}
    ],
    "url": "{{ site.url }}{{ site.baseurl }}/",
    "image": "{{ '/img/logo.webp' | relative_url }}",
    "priceRange": "$$"
  }
  </script>

  {% if page.extra_head %}{{ page.extra_head }}{% endif %}
</head>
